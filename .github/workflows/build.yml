name: build

on:
    workflow_call:
        inputs:
            node_version:
                description: "la version de node"
                required: false
                default: "20"
                type: string
            directory:
                description: "repertoire d'arrivé du build"
                type: string
                required: false
                default: "./build"
        
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: ${{ inputs.node_version }}
                cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build app
              run: npm run build