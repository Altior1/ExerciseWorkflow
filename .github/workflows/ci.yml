name: CI

on:
  push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test

  resume:
    runs-on: ubuntu-latest
    steps:
        - name: resume
          if: always()
          run: |
            echo "This is the resume job"
            echo "## Results" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Tests completed with status: ${{ job.status }}" >> "$GITHUB_STEP_SUM     